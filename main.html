<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .btn {
      position: relative;
      padding: 10px 20px;
      font-size: 16px;
    }

    .badge {
      position: absolute;
      top: -5px;
      right: -10px;
      background: red;
      color: white;
      border-radius: 50%;
      padding: 4px 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <button type="submit" class="btn">
    Messages <span class="badge">5</span>
  </button>
</body>
</html>
