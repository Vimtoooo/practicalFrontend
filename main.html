<!DOCTYPE html>
<html>
<head>
  <title>Split Screen Layout</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      position: sticky;
      top: 1rem;
      text-align: center;
    }

    main {
      padding: 2rem;
      height: 2000px; /* just to create scroll */
    }
  </style>
</head>
<body>
  <header>
    <h1>My Website</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <p>Lots of content here...</p>
    <p>Keep scrolling down to see the header stay in place.</p>
  </main>
</body>
</html>
